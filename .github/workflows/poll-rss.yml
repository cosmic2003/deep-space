name: Poll AI RSS feeds

on:
  schedule:
    # every 30 minutes (GitHub Actions cron is best-effort, may delay a few min)
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

concurrency:
  group: poll-rss
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Poll feeds and update Supabase
        run: npm run poll-rss
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
